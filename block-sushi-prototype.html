<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブロック崩寿司 — プロトタイプ</title>
<style>
  html,body{margin:0;height:100%;background:#1b1410;color:#f5e9d6;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    -webkit-user-select:none;user-select:none;touch-action:none;overflow:hidden}
  h1{font-size:18px;margin:8px 0 4px;letter-spacing:.05em}
  #hud{font-size:13px;margin-bottom:4px;opacity:.95;display:flex;gap:14px;align-items:center}
  #hud b{color:#ffcf6b}
  #hud .clock b{color:#ffe6a3}
  #gaugewrap{width:min(96vw,480px);margin-bottom:6px;display:flex;align-items:center;gap:8px;
    font-size:11px;opacity:.85}
  #gauge{flex:1;height:7px;background:#3a2c20;border-radius:4px;overflow:hidden}
  #gaugefill{height:100%;width:0;background:#ffcf6b}
  #gauge.flash #gaugefill{background:#fff2c8}
  canvas{background:#2a1f17;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,.5);
    max-width:96vw;max-height:70vh;touch-action:none}
  #hint{font-size:12px;opacity:.6;margin-top:8px;text-align:center;line-height:1.6}
</style>
</head>
<body>
  <h1>🍣 ブロック崩寿司 <span style="font-size:11px;opacity:.5">prototype</span></h1>
  <div id="hud">
    <span class="clock">🕛 <b id="clock">11:00</b></span>
    <span>提供 <b id="score">0</b>貫</span>
    <span>お会計 <b id="sat">0</b>人</span>
    <span>皿 <b id="dishes">0</b></span>
  </div>
  <div id="gaugewrap"><span>厨房</span><div id="gauge"><div id="gaugefill"></div></div><span><b id="rate" style="color:#ffcf6b">-</b>秒</span></div>
  <canvas id="cv" width="480" height="640"></canvas>
  <div id="hint">バーを左右に動かして皿を打ち返す（マウス / スワイプ / ←→）<br>
    寿司付きの皿を客に当てると必要貫数（🍣数）が1減り、0で満足退店＝提供貫数を得点。<br>
    時計（レベル）が進むと客の行列が速く・大食いが増える。行列がカウンター到達で閉店。</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const elClock=document.getElementById('clock'),elScore=document.getElementById('score'),
      elSat=document.getElementById('sat'),elDishes=document.getElementById('dishes'),
      elRate=document.getElementById('rate'),elGauge=document.getElementById('gauge'),
      elGaugeFill=document.getElementById('gaugefill');

// ---- 調整できるパラメータ（仕様の暫定値） ----
const CFG={
  cols:5, blockGap:8, blockTop:64, blockH:34,
  initRows:3,              // 初期の客の段数（cols×initRows = 初期人数。5×3=15体）
  spawnBatch:2,            // 1回の湧きで出る客数（頻度はそのまま、量を倍に）
  ballR:11, paddleW:96, paddleH:14, paddleY:H-40,
  speed:5,
  retreatStep:18,          // ノックバック距離
  levelN:8,                // レベルアップに必要なスコア（level=floor(score/N)）
  openHour:11,             // 開店時刻（Lv0=11:00, Lv+1で+1時間）
  nightLevel:12,           // この床レベルで時計停止＝「深夜営業」
  bannerDur:2.6,           // 節目バナーの表示秒
  advanceSpeed:0.11,       // 客の前進速度（固定・脇役 / §4-4で固定確定）
  advanceDelay:8,          // 開始から客が動き出すまでの秒
  custBase:5.0,            // Lv0の湧き間隔（秒）
  custReduction:0.45,      // レベルあたりの湧き間隔 短縮量（秒）
  custFloor:1.1,           // 湧き間隔の床（需要が供給を必ず追い越す側）
  custStart:6,             // 開始から客の湧きが始まるまでの秒
  headBase:52,             // Lv0のヘッドルームY（この範囲に客がいなければ湧く）
  headReduction:2.5,       // レベルあたりの短縮量
  headFloor:40,            // ヘッドルームの床（重なり防止）
  plateBase:10.0,           // 皿の基準供給間隔（秒）
  plateReduction:0.12,     // 満足HP1点あたりの供給間隔 短縮量（秒）
  plateFloor:1.2,          // 供給間隔の床
};

// レベル別 HP分布（重み）。lv以下で最大のエントリを採用。
const HP_TABLE=[
  {lv:0, w:{1:100}},
  {lv:1, w:{1:80, 2:20}},
  {lv:2, w:{1:60, 2:28, 3:12}},
  {lv:3, w:{1:48, 2:30, 3:16, 5:6}},
  {lv:5, w:{1:35, 2:30, 3:23, 5:12}},
];
const HP_COLOR={1:'#e0b57a', 2:'#d59a55', 3:'#c47a3c', 5:'#9e5228'};
// 節目バナー（HP帯の初登場レベルに同期。文言はすべて仮）
const BANNERS={1:'🍽 ランチラッシュ！', 2:'👥 団体様ご来店', 3:'🍚 大食い自慢ご来店', 12:'🏮 深夜営業'};

let paddleX, balls, blocks, score, satisfied, state, gameStartTime, nextCustT, nextPlateT, bw;
let prevLevel, bannerText, bannerUntil, lastPlateAt, curPlateGap, satFlashUntil, gElapsed;
// state: 'ready' | 'play' | 'lose'

function level(){ return Math.floor(score/CFG.levelN); }
function custInterval(){ return Math.max(CFG.custFloor, CFG.custBase-level()*CFG.custReduction); }
function headroom(){ return Math.max(CFG.headFloor, CFG.headBase-level()*CFG.headReduction); }
function plateInterval(){ return Math.max(CFG.plateFloor, CFG.plateBase-score*CFG.plateReduction); }
function clockText(){ const lv=level(); if(lv>=CFG.nightLevel) return '深夜営業';
  return (CFG.openHour+lv)+':00'; }
function pickHp(){
  const lv=level(); let tab=HP_TABLE[0];
  for(const t of HP_TABLE) if(lv>=t.lv) tab=t;
  const entries=Object.entries(tab.w);
  const total=entries.reduce((s,[,w])=>s+w,0);
  let r=Math.random()*total;
  for(const [hp,w] of entries){ if((r-=w)<0) return +hp; }
  return 1;
}

function reset(){
  paddleX=W/2; balls=[]; score=0; satisfied=0; buildBlocks();
  gameStartTime=null; nextCustT=CFG.custStart; nextPlateT=CFG.plateBase;
  prevLevel=0; bannerText=''; bannerUntil=0; lastPlateAt=0; curPlateGap=CFG.plateBase;
  satFlashUntil=0; gElapsed=0;
  state='ready'; draw();
}
function colX(c){ return CFG.blockGap+c*(bw+CFG.blockGap); }
function buildBlocks(){
  blocks=[];
  bw=(W-CFG.blockGap*(CFG.cols+1))/CFG.cols;
  const rowGap=CFG.blockH+CFG.blockGap;
  for(let c=0;c<CFG.cols;c++) for(let r=0;r<CFG.initRows;r++)
    addCustomer(colX(c), CFG.blockTop+r*rowGap, r===0?2:1); // 一番上の段(r=0)はHP2、他はHP1
}
function addCustomer(x,y,hp){
  blocks.push({x, y, w:bw, h:CFG.blockH, hp, maxHp:hp, alive:true, flash:0});
}
// ヘッドルーム式の湧き：列上端からheadroom内に客がいない列に出現＝行列化
function spawnCustomer(){
  const hz=headroom(), elig=[];
  for(let c=0;c<CFG.cols;c++){
    const cx=colX(c);
    let topY=Infinity;
    for(const b of blocks) if(b.alive && Math.abs(b.x-cx)<1) topY=Math.min(topY,b.y);
    if(topY>=CFG.blockTop+hz) elig.push(cx);
  }
  if(elig.length){
    const cx=elig[Math.floor(Math.random()*elig.length)];
    addCustomer(cx, CFG.blockTop, pickHp());
  }
}
// 皿をカウンター（バー）から上へ供給。loaded で寿司ありスタートを指定。
function spawnPlate(loaded){
  balls.push({x:paddleX, y:CFG.paddleY-CFG.ballR-2,
    vx:(Math.random()*2-1)*2, vy:-CFG.speed, loaded:!!loaded});
}
function start(){
  if(state==='ready'){ state='play'; gameStartTime=performance.now(); spawnPlate(true); } // 初回は寿司あり
  else if(state==='lose'){ reset(); }
}
// ノックバック：後続（同列で真上の客）に詰める形でクランプ
function knockback(b){
  b.flash=8;
  let above=null;
  for(const o of blocks) if(o!==b && o.alive && Math.abs(o.x-b.x)<1 && o.y<b.y)
    if(!above||o.y>above.y) above=o;
  const ceil=above?above.y+above.h+CFG.blockGap:CFG.blockTop;
  b.y=Math.max(ceil, b.y-CFG.retreatStep);
}

// ---- 入力 ----
function movePaddle(x){
  const rect=cv.getBoundingClientRect();
  paddleX=(x-rect.left)*(W/rect.width);
  paddleX=Math.max(CFG.paddleW/2,Math.min(W-CFG.paddleW/2,paddleX));
}
cv.addEventListener('mousemove',e=>movePaddle(e.clientX));
cv.addEventListener('touchmove',e=>{movePaddle(e.touches[0].clientX);e.preventDefault();},{passive:false});
cv.addEventListener('mousedown',start);
cv.addEventListener('touchstart',e=>{start();e.preventDefault();},{passive:false});
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')paddleX=Math.max(CFG.paddleW/2,paddleX-28);
  if(e.key==='ArrowRight')paddleX=Math.min(W-CFG.paddleW/2,paddleX+28);
  if(e.key===' '){start();e.preventDefault();}
});

// ---- 更新 ----
function update(){
  if(state==='play'){
    const px0=paddleX-CFG.paddleW/2, px1=paddleX+CFG.paddleW/2;
    for(const ball of balls){
      ball.x+=ball.vx; ball.y+=ball.vy;
      if(ball.x<CFG.ballR){ball.x=CFG.ballR;ball.vx*=-1;}
      if(ball.x>W-CFG.ballR){ball.x=W-CFG.ballR;ball.vx*=-1;}
      if(ball.y<CFG.ballR){ball.y=CFG.ballR;ball.vy*=-1;}
      if(ball.vy>0 && ball.y+CFG.ballR>=CFG.paddleY && ball.y<CFG.paddleY+CFG.paddleH
         && ball.x>px0 && ball.x<px1){
        ball.y=CFG.paddleY-CFG.ballR;
        const rel=(ball.x-paddleX)/(CFG.paddleW/2);
        ball.vx=rel*CFG.speed*0.9;
        ball.vy=-Math.sqrt(Math.max(1,CFG.speed*CFG.speed-ball.vx*ball.vx));
        ball.loaded=true; // 打ち返すと寿司が1貫載る
      }
      for(const b of blocks){
        if(!b.alive)continue;
        if(ball.x>b.x-CFG.ballR && ball.x<b.x+b.w+CFG.ballR &&
           ball.y>b.y-CFG.ballR && ball.y<b.y+b.h+CFG.ballR){
          const overL=ball.x-(b.x-CFG.ballR), overR=(b.x+b.w+CFG.ballR)-ball.x;
          const overT=ball.y-(b.y-CFG.ballR), overB=(b.y+b.h+CFG.ballR)-ball.y;
          const m=Math.min(overL,overR,overT,overB);
          if(m===overT||m===overB)ball.vy*=-1; else ball.vx*=-1;
          if(ball.loaded){
            ball.loaded=false; b.hp--;
            if(b.hp<=0){ score+=b.maxHp; satisfied++; b.alive=false; satFlashUntil=gElapsed+0.25; } // 満足＝HP分をまとめて加算
            else knockback(b);                                        // 食いかけもノックバック
          }else knockback(b);                                          // 空の皿もノックバック
          break;
        }
      }
    }
    balls=balls.filter(ball=>ball.y-CFG.ballR<=H); // 落ちた皿は退場（排出口）

    gElapsed=(performance.now()-gameStartTime)/1000;
    if(gElapsed>=CFG.advanceDelay) blocks.forEach(b=>{ if(b.alive) b.y+=CFG.advanceSpeed; });
    while(gElapsed>=nextCustT){ for(let i=0;i<CFG.spawnBatch;i++) spawnCustomer(); nextCustT+=custInterval(); } // 湧き（量=spawnBatch、間隔はレベルで短縮）
    while(gElapsed>=nextPlateT){ spawnPlate(false); lastPlateAt=nextPlateT; curPlateGap=plateInterval(); nextPlateT+=curPlateGap; } // 蛇口（ΣHPで短縮）
    // 節目バナー（レベルが上がった瞬間に発火）
    const lv=level();
    if(lv>prevLevel){
      for(let mlv=prevLevel+1;mlv<=lv;mlv++) if(BANNERS[mlv]){ bannerText=BANNERS[mlv]; bannerUntil=gElapsed+CFG.bannerDur; }
      prevLevel=lv;
    }
    if(blocks.some(b=>b.alive && b.y+b.h>=CFG.paddleY)) state='lose'; // 唯一の敗北条件（行列到達）
    blocks=blocks.filter(b=>b.alive);
  }
  if(blocks) blocks.forEach(b=>{if(b.flash>0)b.flash--;});
}

// ---- 描画 ----
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawPlate(ball){
  ctx.fillStyle='#f2efe6';ctx.beginPath();ctx.arc(ball.x,ball.y,CFG.ballR,0,7);ctx.fill();
  ctx.strokeStyle='#cfc7b5';ctx.lineWidth=2;ctx.stroke();
  if(ball.loaded){ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🍣',ball.x,ball.y-1);}
}
function draw(){
  ctx.clearRect(0,0,W,H);
  blocks.forEach(b=>{
    if(!b.alive)return;
    ctx.fillStyle=b.flash>0?'#ff8a5c':(HP_COLOR[b.maxHp]||'#c98a4b');
    rr(b.x,b.y,b.w,b.h,8);ctx.fill();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='15px serif';ctx.fillStyle='#2a1f17';
    ctx.fillText('🍣×'+b.hp, b.x+b.w/2, b.y+b.h/2);
  });
  ctx.fillStyle='#8a5a2b';rr(paddleX-CFG.paddleW/2,CFG.paddleY,CFG.paddleW,CFG.paddleH,7);ctx.fill();
  if(state==='ready') drawPlate({x:paddleX,y:CFG.paddleY-CFG.ballR-2,loaded:true});
  else balls.forEach(drawPlate);
  // 節目バナー
  if(state==='play' && gElapsed<bannerUntil){
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H*0.22,W,54);
    ctx.fillStyle='#ffcf6b';ctx.font='bold 26px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(bannerText,W/2,H*0.22+27);
  }
  // 開店前 / 閉店
  if(state!=='play'){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H/2-46,W,92);
    ctx.fillStyle='#ffcf6b';ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(state==='lose'?'🏮 閉店…':'タップ / スペースで開店',W/2,H/2-8);
    if(state==='lose'){ctx.font='14px sans-serif';ctx.fillStyle='#f5e9d6';
      ctx.fillText('行列がカウンター到達　提供 '+score+'貫（お会計 '+satisfied+'人）',W/2,H/2+14);
      ctx.fillText('開店する → タップ',W/2,H/2+34);}
  }
  // HUD
  elClock.textContent=clockText();
  elScore.textContent=score;
  elSat.textContent=satisfied;
  elDishes.textContent=balls?balls.length:0;
  elRate.textContent=(state==='play')?plateInterval().toFixed(1):'-';
  // 厨房ゲージ（次の皿までのクールタイム進捗。速くなるほど速く満ちる＝忙しさが見える）
  const frac=(state==='play'&&curPlateGap>0)?Math.min(1,Math.max(0,(gElapsed-lastPlateAt)/curPlateGap)):0;
  elGaugeFill.style.width=(frac*100)+'%';
  elGauge.classList.toggle('flash', state==='play'&&gElapsed<satFlashUntil);
}
function loop(){update();draw();requestAnimationFrame(loop);}
reset();loop();
</script>
</body>
</html>
